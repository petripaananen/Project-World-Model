<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project World Model — Scenario Strategist</title>
    <meta name="description" content="L3 Causal Digital Twin Dashboard — Team of Rivals Architecture">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        /* ── Design Tokens ─────────────────────────────────── */
        :root {
            --bg-primary: #0a0e1a;
            --bg-secondary: #111827;
            --bg-card: rgba(17, 24, 39, 0.7);
            --bg-glass: rgba(17, 24, 39, 0.5);
            --border-glass: rgba(255, 255, 255, 0.08);
            --border-glow: rgba(6, 182, 212, 0.2);
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-dim: #64748b;
            --accent-cyan: #06b6d4;
            --accent-cyan-dim: rgba(6, 182, 212, 0.15);
            --accent-emerald: #10b981;
            --accent-emerald-dim: rgba(16, 185, 129, 0.15);
            --accent-amber: #f59e0b;
            --accent-amber-dim: rgba(245, 158, 11, 0.15);
            --accent-rose: #f43f5e;
            --accent-rose-dim: rgba(244, 63, 94, 0.15);
            --accent-violet: #8b5cf6;
            --accent-violet-dim: rgba(139, 92, 246, 0.15);
            --radius: 12px;
            --radius-sm: 8px;
            --shadow: 0 4px 24px rgba(0, 0, 0, 0.3);
            --font-ui: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* ── Reset & Base ──────────────────────────────────── */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html { font-size: 14px; scroll-behavior: smooth; }
        body {
            font-family: var(--font-ui);
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background:
                radial-gradient(ellipse at 20% 0%, rgba(6, 182, 212, 0.06) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 100%, rgba(139, 92, 246, 0.04) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        /* ── Layout ────────────────────────────────────────── */
        .app { position: relative; z-index: 1; }
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 24px;
            background: var(--bg-glass);
            border-bottom: 1px solid var(--border-glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .header-left { display: flex; align-items: center; gap: 16px; }
        .logo {
            font-size: 1.3rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-violet));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .logo-sub { font-size: 0.75rem; color: var(--text-dim); font-weight: 400; }
        .header-right { display: flex; align-items: center; gap: 20px; }

        .status-badge {
            display: flex; align-items: center; gap: 6px;
            padding: 4px 12px;
            border-radius: 999px;
            font-size: 0.75rem;
            font-weight: 500;
            background: var(--accent-cyan-dim);
            color: var(--accent-cyan);
            border: 1px solid rgba(6, 182, 212, 0.2);
        }
        .status-badge.disconnected {
            background: var(--accent-rose-dim);
            color: var(--accent-rose);
            border-color: rgba(244, 63, 94, 0.2);
        }
        .pulse {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: var(--accent-cyan);
            animation: pulse-anim 2s ease-in-out infinite;
        }
        .disconnected .pulse { background: var(--accent-rose); animation: none; }

        @keyframes pulse-anim {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(0.8); }
        }

        .crr-badge {
            font-family: var(--font-mono);
            font-size: 1rem;
            font-weight: 600;
            padding: 6px 16px;
            border-radius: var(--radius-sm);
            background: var(--bg-card);
            border: 1px solid var(--border-glass);
        }
        .crr-badge.exceptional { color: var(--accent-emerald); border-color: rgba(16, 185, 129, 0.3); }
        .crr-badge.good { color: var(--accent-cyan); border-color: rgba(6, 182, 212, 0.3); }
        .crr-badge.warning { color: var(--accent-amber); border-color: rgba(245, 158, 11, 0.3); }
        .crr-badge.danger { color: var(--accent-rose); border-color: rgba(244, 63, 94, 0.3); }

        /* ── Dashboard Grid ────────────────────────────────── */
        .dashboard {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: auto auto 1fr;
            gap: 16px;
            padding: 20px 24px;
            max-width: 1600px;
            margin: 0 auto;
        }
        .dashboard > .full-width { grid-column: 1 / -1; }

        /* ── Card ──────────────────────────────────────────── */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius);
            padding: 20px;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            box-shadow: var(--shadow);
            transition: border-color var(--transition), box-shadow var(--transition);
        }
        .card:hover {
            border-color: var(--border-glow);
            box-shadow: var(--shadow), 0 0 30px rgba(6, 182, 212, 0.05);
        }
        .card-title {
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-secondary);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .card-title .icon { font-size: 1rem; }

        /* ── Stats Grid ────────────────────────────────────── */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
        }
        .stat {
            background: var(--bg-secondary);
            border-radius: var(--radius-sm);
            padding: 14px 16px;
            border: 1px solid var(--border-glass);
        }
        .stat-label {
            font-size: 0.7rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-bottom: 4px;
        }
        .stat-value {
            font-family: var(--font-mono);
            font-size: 1.5rem;
            font-weight: 600;
        }

        /* ── Conflict Cards ────────────────────────────────── */
        .conflict-list { display: flex; flex-direction: column; gap: 10px; max-height: 500px; overflow-y: auto; }
        .conflict-card {
            background: var(--bg-secondary);
            border-radius: var(--radius-sm);
            padding: 14px 16px;
            border-left: 3px solid var(--text-dim);
            cursor: pointer;
            transition: all var(--transition);
        }
        .conflict-card:hover { transform: translateX(4px); }
        .conflict-card.critical { border-left-color: var(--accent-rose); }
        .conflict-card.high { border-left-color: var(--accent-amber); }
        .conflict-card.medium { border-left-color: var(--accent-cyan); }
        .conflict-card.low { border-left-color: var(--accent-emerald); }

        .conflict-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
        .conflict-type {
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }
        .severity-badge {
            font-size: 0.65rem;
            font-weight: 600;
            padding: 2px 8px;
            border-radius: 999px;
            text-transform: uppercase;
        }
        .severity-badge.critical { background: var(--accent-rose-dim); color: var(--accent-rose); }
        .severity-badge.high { background: var(--accent-amber-dim); color: var(--accent-amber); }
        .severity-badge.medium { background: var(--accent-cyan-dim); color: var(--accent-cyan); }
        .severity-badge.low { background: var(--accent-emerald-dim); color: var(--accent-emerald); }

        .conflict-desc { font-size: 0.85rem; color: var(--text-secondary); line-height: 1.4; }
        .conflict-meta { font-size: 0.7rem; color: var(--text-dim); margin-top: 8px; font-family: var(--font-mono); }

        .conflict-details {
            display: none;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid var(--border-glass);
        }
        .conflict-card.expanded .conflict-details { display: block; }

        .file-chips { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px; }
        .file-chip {
            font-size: 0.65rem;
            font-family: var(--font-mono);
            padding: 2px 8px;
            border-radius: 4px;
            background: var(--accent-violet-dim);
            color: var(--accent-violet);
        }

        /* ── Agent Negotiation Tree ────────────────────────── */
        .negotiation-list { display: flex; flex-direction: column; gap: 12px; max-height: 500px; overflow-y: auto; }
        .negotiation-item {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            gap: 12px;
            align-items: stretch;
        }
        .agent-node {
            background: var(--bg-secondary);
            border-radius: var(--radius-sm);
            padding: 12px 14px;
            border: 1px solid var(--border-glass);
            font-size: 0.8rem;
        }
        .agent-node.worker { border-top: 2px solid var(--accent-cyan); }
        .agent-node.critic { border-top: 2px solid var(--accent-violet); }
        .agent-label {
            font-size: 0.65rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-bottom: 6px;
        }
        .worker .agent-label { color: var(--accent-cyan); }
        .critic .agent-label { color: var(--accent-violet); }

        .tree-connector {
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-dim);
            font-size: 1.2rem;
        }

        .verdict-icon { font-size: 1.1rem; }
        .strategy-title { font-weight: 500; margin-bottom: 4px; }
        .strategy-meta { font-size: 0.7rem; color: var(--text-dim); font-family: var(--font-mono); }

        /* ── Event Log ─────────────────────────────────────── */
        .event-log { max-height: 300px; overflow-y: auto; }
        .event-item {
            display: flex;
            gap: 10px;
            padding: 8px 0;
            border-bottom: 1px solid var(--border-glass);
            font-size: 0.8rem;
            animation: fadeSlideIn 0.3s ease-out;
        }
        @keyframes fadeSlideIn {
            from { opacity: 0; transform: translateY(-8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .event-time { color: var(--text-dim); font-family: var(--font-mono); font-size: 0.7rem; white-space: nowrap; min-width: 65px; }
        .event-actor {
            font-size: 0.65rem;
            font-weight: 600;
            padding: 1px 6px;
            border-radius: 4px;
            white-space: nowrap;
        }
        .event-actor.system { background: var(--accent-cyan-dim); color: var(--accent-cyan); }
        .event-actor.worker_agent { background: var(--accent-emerald-dim); color: var(--accent-emerald); }
        .event-actor.critic_agent { background: var(--accent-violet-dim); color: var(--accent-violet); }
        .event-actor.human { background: var(--accent-amber-dim); color: var(--accent-amber); }
        .event-actor.debt_detector { background: var(--accent-rose-dim); color: var(--accent-rose); }
        .event-actor.crr_engine { background: var(--accent-cyan-dim); color: var(--accent-cyan); }
        .event-summary { color: var(--text-secondary); flex: 1; }

        /* ── CRR Chart ─────────────────────────────────────── */
        .crr-chart { display: flex; align-items: flex-end; gap: 3px; height: 80px; padding-top: 8px; }
        .crr-bar {
            flex: 1;
            min-width: 12px;
            max-width: 30px;
            border-radius: 3px 3px 0 0;
            transition: height var(--transition);
            position: relative;
        }
        .crr-bar:hover::after {
            content: attr(data-tooltip);
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            padding: 4px 8px;
            background: var(--bg-primary);
            border: 1px solid var(--border-glass);
            border-radius: 4px;
            font-size: 0.65rem;
            font-family: var(--font-mono);
            white-space: nowrap;
            z-index: 10;
        }

        /* ── Action Buttons ────────────────────────────────── */
        .actions { display: flex; gap: 12px; flex-wrap: wrap; }
        .btn {
            padding: 10px 24px;
            border: none;
            border-radius: var(--radius-sm);
            font-family: var(--font-ui);
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all var(--transition);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .btn:hover { transform: translateY(-1px); }
        .btn:active { transform: translateY(0); }
        .btn-approve {
            background: linear-gradient(135deg, #059669, #10b981);
            color: white;
            box-shadow: 0 4px 14px rgba(16, 185, 129, 0.3);
        }
        .btn-approve:hover { box-shadow: 0 6px 20px rgba(16, 185, 129, 0.4); }
        .btn-veto {
            background: linear-gradient(135deg, #dc2626, #f43f5e);
            color: white;
            box-shadow: 0 4px 14px rgba(244, 63, 94, 0.3);
        }
        .btn-veto:hover { box-shadow: 0 6px 20px rgba(244, 63, 94, 0.4); }
        .btn-sandbox {
            background: linear-gradient(135deg, #7c3aed, #8b5cf6);
            color: white;
            box-shadow: 0 4px 14px rgba(139, 92, 246, 0.3);
        }
        .btn-sandbox:hover { box-shadow: 0 6px 20px rgba(139, 92, 246, 0.4); }

        /* ── Sandbox Panel ─────────────────────────────────── */
        .sandbox-panel {
            display: none;
            margin-top: 16px;
            padding: 16px;
            background: var(--bg-secondary);
            border-radius: var(--radius-sm);
            border: 1px solid var(--accent-violet-dim);
        }
        .sandbox-panel.visible { display: block; animation: fadeSlideIn 0.3s ease-out; }
        .sandbox-result { margin-top: 12px; }
        .sandbox-comparison {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            gap: 16px;
            align-items: center;
            margin-top: 12px;
        }
        .sandbox-metric {
            text-align: center;
            padding: 16px;
            background: var(--bg-card);
            border-radius: var(--radius-sm);
        }
        .sandbox-metric-label { font-size: 0.7rem; color: var(--text-dim); text-transform: uppercase; }
        .sandbox-metric-value { font-family: var(--font-mono); font-size: 1.8rem; font-weight: 600; margin-top: 4px; }
        .sandbox-arrow { font-size: 1.5rem; color: var(--accent-emerald); }
        .sandbox-select {
            width: 100%;
            padding: 8px 12px;
            background: var(--bg-card);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-sm);
            color: var(--text-primary);
            font-family: var(--font-ui);
            font-size: 0.85rem;
            margin-bottom: 12px;
        }

        /* ── Modal ─────────────────────────────────────────── */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            z-index: 200;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.visible { display: flex; }
        .modal {
            background: var(--bg-secondary);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius);
            padding: 28px;
            max-width: 440px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            animation: modalIn 0.25s ease-out;
        }
        @keyframes modalIn {
            from { opacity: 0; transform: scale(0.95) translateY(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
        .modal-title { font-size: 1.1rem; font-weight: 600; margin-bottom: 12px; }
        .modal-body { color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 20px; line-height: 1.5; }
        .modal-actions { display: flex; gap: 10px; justify-content: flex-end; }
        .btn-cancel {
            padding: 8px 20px;
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-sm);
            background: transparent;
            color: var(--text-secondary);
            font-family: var(--font-ui);
            font-weight: 500;
            cursor: pointer;
        }

        /* ── Waiting State ─────────────────────────────────── */
        .waiting {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 60vh;
            gap: 20px;
            grid-column: 1 / -1;
        }
        .waiting-spinner {
            width: 48px; height: 48px;
            border: 3px solid var(--border-glass);
            border-top-color: var(--accent-cyan);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .waiting-text { color: var(--text-dim); font-size: 0.9rem; }

        /* ── Scrollbar ─────────────────────────────────────── */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border-glass); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }
    </style>
</head>
<body>
    <div class="app">
        <!-- ── Header ──────────────────────────────────────── -->
        <header class="header">
            <div class="header-left">
                <div>
                    <div class="logo">🌍 Project World Model</div>
                    <div class="logo-sub">L3 Causal Digital Twin • Team of Rivals</div>
                </div>
            </div>
            <div class="header-right">
                <div id="crrBadge" class="crr-badge">CRR: —</div>
                <div id="statusBadge" class="status-badge disconnected">
                    <div class="pulse"></div>
                    <span id="statusText">Connecting...</span>
                </div>
            </div>
        </header>

        <!-- ── Dashboard Grid ──────────────────────────────── -->
        <main class="dashboard" id="dashboard">
            <div class="waiting" id="waitingState">
                <div class="waiting-spinner"></div>
                <div class="waiting-text">Waiting for pipeline data...</div>
                <div class="waiting-text" style="font-size: 0.75rem;">Run <code style="color: var(--accent-cyan);">python -m pwm.main --mode demo --web --loop</code></div>
            </div>
        </main>
    </div>

    <!-- ── Confirmation Modal ──────────────────────────────── -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <div class="modal-title" id="modalTitle"></div>
            <div class="modal-body" id="modalBody"></div>
            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeModal()">Cancel</button>
                <button class="btn" id="modalConfirmBtn" onclick="confirmAction()">Confirm</button>
            </div>
        </div>
    </div>

    <script>
    // ── State ─────────────────────────────────────────────────
    let ws = null;
    let currentState = null;
    let pendingAction = null;

    // ── WebSocket Connection ──────────────────────────────────
    function connect() {
        const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
        ws = new WebSocket(`${proto}//${location.host}/ws`);

        ws.onopen = () => {
            document.getElementById('statusBadge').className = 'status-badge';
            document.getElementById('statusText').textContent = 'Connected';
        };

        ws.onclose = () => {
            document.getElementById('statusBadge').className = 'status-badge disconnected';
            document.getElementById('statusText').textContent = 'Reconnecting...';
            setTimeout(connect, 3000);
        };

        ws.onmessage = (event) => {
            const msg = JSON.parse(event.data);
            if (msg.type === 'state_update') {
                currentState = msg.data;
                renderDashboard(msg.data);
            } else if (msg.type === 'decision') {
                showToast(msg.data.approved ? '✅ Proposals Approved' : '❌ Proposals Vetoed');
            }
        };
    }

    // ── Render Full Dashboard ─────────────────────────────────
    function renderDashboard(state) {
        const dash = document.getElementById('dashboard');

        // Update CRR badge in header
        if (state.crr) {
            const badge = document.getElementById('crrBadge');
            const crr = state.crr.crr;
            badge.textContent = `CRR: ${crr.toFixed(4)}`;
            badge.className = 'crr-badge ' + (crr < 0.01 ? 'exceptional' : crr < 0.5 ? 'good' : crr < 1 ? 'warning' : 'danger');
        }

        dash.innerHTML = `
            <!-- Row 1: Project Overview (full width) -->
            <div class="card full-width" id="overviewCard">
                <div class="card-title"><span class="icon">📡</span> Layer 1: Project State</div>
                ${renderStats(state)}
            </div>

            <!-- Row 2: Debt + Negotiation Tree -->
            <div class="card" id="debtCard">
                <div class="card-title"><span class="icon">🔍</span> Layer 2: Integration Debt</div>
                ${renderDebtPanel(state)}
            </div>
            <div class="card" id="treeCard">
                <div class="card-title"><span class="icon">🤖</span> Layers 3+4: Agent Negotiation</div>
                ${renderNegotiationTree(state)}
            </div>

            <!-- Row 3: Actions + Events -->
            <div class="card" id="actionsCard">
                <div class="card-title"><span class="icon">🎯</span> Layer 5: Scenario Strategist</div>
                ${renderActions(state)}
            </div>
            <div class="card" id="eventsCard">
                <div class="card-title"><span class="icon">📜</span> Event Audit Log</div>
                ${renderEventLog(state)}
            </div>
        `;
    }

    // ── Render Components ─────────────────────────────────────
    function renderStats(state) {
        const ps = state.project_state;
        const dr = state.debt_report;
        const crr = state.crr;
        if (!ps) return '<div class="waiting-text">No project data</div>';

        return `<div class="stats-grid">
            <div class="stat">
                <div class="stat-label">Repository</div>
                <div class="stat-value" style="font-size:1rem;">${ps.repo_owner}/${ps.repo_name}</div>
            </div>
            <div class="stat">
                <div class="stat-label">Open PRs</div>
                <div class="stat-value" style="color:var(--accent-cyan)">${ps.total_open_prs}</div>
            </div>
            <div class="stat">
                <div class="stat-label">Active Branches</div>
                <div class="stat-value" style="color:var(--accent-violet)">${ps.total_active_branches}</div>
            </div>
            <div class="stat">
                <div class="stat-label">Debt Items</div>
                <div class="stat-value" style="color:var(--accent-amber)">${dr ? dr.total_debt_items : 0}</div>
            </div>
            <div class="stat">
                <div class="stat-label">Rework Risk</div>
                <div class="stat-value" style="color:var(--accent-rose)">${dr ? dr.total_estimated_rework_hours.toFixed(1) + 'h' : '—'}</div>
            </div>
            <div class="stat">
                <div class="stat-label">AI Cost</div>
                <div class="stat-value" style="color:var(--accent-emerald)">$${crr ? crr.total_ai_cost_usd.toFixed(4) : '—'}</div>
            </div>
            ${renderCRRChart(state)}
        </div>`;
    }

    function renderCRRChart(state) {
        const history = state.crr_history || [];
        if (history.length === 0) return '';

        const maxCrr = Math.max(...history.map(h => h.crr), 0.01);
        const bars = history.map(h => {
            const pct = Math.min((h.crr / maxCrr) * 100, 100);
            const color = h.crr < 0.01 ? 'var(--accent-emerald)' : h.crr < 0.5 ? 'var(--accent-cyan)' : h.crr < 1 ? 'var(--accent-amber)' : 'var(--accent-rose)';
            return `<div class="crr-bar" style="height:${Math.max(pct, 5)}%;background:${color}" data-tooltip="CRR: ${h.crr.toFixed(4)} | Run: ${h.run_id}"></div>`;
        }).join('');

        return `<div class="stat" style="grid-column: span 2;">
            <div class="stat-label">CRR History</div>
            <div class="crr-chart">${bars}</div>
        </div>`;
    }

    function renderDebtPanel(state) {
        const dr = state.debt_report;
        if (!dr || !dr.conflicts || dr.conflicts.length === 0) {
            return '<div style="color:var(--accent-emerald);text-align:center;padding:20px;">✅ No integration debt detected</div>';
        }

        return `<div style="margin-bottom:12px;color:var(--text-secondary);font-size:0.85rem;">${dr.executive_summary}</div>
        <div class="conflict-list">
            ${dr.conflicts.map((c, i) => `
                <div class="conflict-card ${c.severity}" onclick="toggleConflict(this, ${i})">
                    <div class="conflict-header">
                        <span class="conflict-type">${c.conflict_type.replace('_', ' ')}</span>
                        <span class="severity-badge ${c.severity}">${c.severity}</span>
                    </div>
                    <div class="conflict-desc">${c.description.substring(0, 120)}${c.description.length > 120 ? '...' : ''}</div>
                    <div class="conflict-meta">⏱ ${c.estimated_rework_hours.toFixed(1)}h rework</div>
                    <div class="conflict-details">
                        <div style="font-size:0.75rem;color:var(--text-dim);margin-bottom:8px;">AFFECTED FILES</div>
                        <div class="file-chips">
                            ${(c.affected_files || []).map(f => `<span class="file-chip">${f}</span>`).join('')}
                        </div>
                        <div style="margin-top:12px;">
                            <button class="btn btn-sandbox" style="padding:6px 14px;font-size:0.75rem;" onclick="event.stopPropagation();openSandbox(${i})">🔮 What-If Simulation</button>
                        </div>
                    </div>
                </div>
            `).join('')}
        </div>`;
    }

    function renderNegotiationTree(state) {
        const proposals = state.proposals || [];
        const verdicts = state.verdicts || [];
        if (proposals.length === 0) return '<div style="color:var(--text-dim);text-align:center;padding:20px;">No proposals yet</div>';

        return `<div class="negotiation-list">
            ${proposals.map((p, i) => {
                const v = verdicts[i];
                const recStrat = p.strategies[p.recommended_strategy_index] || p.strategies[0];
                const verdictIcon = v ? (v.verdict === 'approved' ? '✅' : v.verdict === 'rejected' ? '❌' : '🔄') : '⏳';
                const verdictColor = v ? (v.verdict === 'approved' ? 'var(--accent-emerald)' : v.verdict === 'rejected' ? 'var(--accent-rose)' : 'var(--accent-amber)') : 'var(--text-dim)';

                return `<div class="negotiation-item">
                    <div class="agent-node worker">
                        <div class="agent-label">Worker Agent</div>
                        <div class="strategy-title">★ ${recStrat ? recStrat.title : 'No strategy'}</div>
                        <div class="strategy-meta">${recStrat ? recStrat.estimated_effort_hours.toFixed(1) + 'h effort • ' + recStrat.risk_level + ' risk' : ''}</div>
                        <div style="margin-top:6px;font-size:0.75rem;color:var(--text-dim);">${p.worker_reasoning ? p.worker_reasoning.substring(0, 100) + '...' : ''}</div>
                    </div>
                    <div class="tree-connector">→</div>
                    <div class="agent-node critic">
                        <div class="agent-label">Critic Agent</div>
                        <div style="font-size:1.4rem;margin-bottom:4px;">${verdictIcon}</div>
                        ${v ? `
                            <div class="strategy-meta">Integrity: ${(v.architectural_integrity_score * 100).toFixed(0)}%</div>
                            <div class="strategy-meta">Scope: ${v.scope_assessment}</div>
                            <div style="margin-top:6px;font-size:0.75rem;color:var(--text-dim);">${v.critique ? v.critique.substring(0, 100) + '...' : ''}</div>
                        ` : '<div class="strategy-meta">Pending review</div>'}
                    </div>
                </div>`;
            }).join('')}
        </div>`;
    }

    function renderActions(state) {
        const humanApproved = state.human_approved;
        let statusMsg = '';
        if (humanApproved === true) statusMsg = '<div style="color:var(--accent-emerald);font-weight:600;margin-bottom:12px;">✅ Proposals APPROVED by Scenario Strategist</div>';
        else if (humanApproved === false) statusMsg = '<div style="color:var(--accent-rose);font-weight:600;margin-bottom:12px;">❌ Proposals VETOED by Scenario Strategist</div>';

        return `${statusMsg}
        <div class="actions">
            <button class="btn btn-approve" onclick="showModal('approve')">✅ Approve All</button>
            <button class="btn btn-veto" onclick="showModal('veto')">❌ Veto All</button>
            <button class="btn btn-sandbox" onclick="toggleSandboxPanel()">🔮 What-If Sandbox</button>
        </div>
        <div class="sandbox-panel" id="sandboxPanel">
            <div class="card-title"><span class="icon">🔮</span> What-If Sandbox</div>
            <label style="font-size:0.8rem;color:var(--text-secondary);display:block;margin-bottom:6px;">Select a conflict to simulate resolving:</label>
            <select class="sandbox-select" id="sandboxConflictSelect">
                ${(state.debt_report?.conflicts || []).map((c, i) => `<option value="${i}">Conflict #${i + 1}: ${c.conflict_type.replace('_', ' ')} — ${c.description.substring(0, 60)}...</option>`).join('')}
            </select>
            <button class="btn btn-sandbox" style="width:100%;justify-content:center;" onclick="runSandbox()">Run Simulation</button>
            <div id="sandboxResult" class="sandbox-result"></div>
        </div>
        ${renderCRRDetail(state)}`;
    }

    function renderCRRDetail(state) {
        if (!state.crr) return '';
        const c = state.crr;
        return `<div style="margin-top:16px;padding:14px;background:var(--bg-secondary);border-radius:var(--radius-sm);border:1px solid var(--border-glass);">
            <div style="font-family:var(--font-mono);font-size:1.1rem;font-weight:600;margin-bottom:8px;">
                CRR = ${c.crr.toFixed(4)}
                <span style="font-size:0.8rem;color:var(--text-dim);font-weight:400;margin-left:8px;">${c.crr_interpretation}</span>
            </div>
            <div style="font-size:0.8rem;color:var(--text-secondary);line-height:1.6;">
                💰 AI Cost: $${c.total_ai_cost_usd.toFixed(4)} (${c.total_input_tokens.toLocaleString()} in / ${c.total_output_tokens.toLocaleString()} out)<br>
                👤 Rework Saved: $${c.estimated_rework_cost_usd.toFixed(2)} (${c.estimated_rework_hours.toFixed(1)}h × hourly rate)
            </div>
        </div>`;
    }

    function renderEventLog(state) {
        const events = state.events || [];
        if (events.length === 0) return '<div style="color:var(--text-dim);text-align:center;padding:20px;">No events recorded</div>';

        return `<div class="event-log">
            ${events.map(e => {
                const time = new Date(e.timestamp).toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
                return `<div class="event-item">
                    <span class="event-time">${time}</span>
                    <span class="event-actor ${e.actor}">${e.actor}</span>
                    <span class="event-summary">${e.summary}</span>
                </div>`;
            }).join('')}
        </div>`;
    }

    // ── Interactions ──────────────────────────────────────────
    function toggleConflict(el, index) {
        el.classList.toggle('expanded');
    }

    function toggleSandboxPanel() {
        document.getElementById('sandboxPanel').classList.toggle('visible');
    }

    function openSandbox(conflictIndex) {
        const panel = document.getElementById('sandboxPanel');
        panel.classList.add('visible');
        document.getElementById('sandboxConflictSelect').value = conflictIndex;
        panel.scrollIntoView({ behavior: 'smooth' });
    }

    async function runSandbox() {
        const idx = parseInt(document.getElementById('sandboxConflictSelect').value);
        const resultDiv = document.getElementById('sandboxResult');
        resultDiv.innerHTML = '<div style="color:var(--text-dim);padding:12px;">Running simulation...</div>';

        try {
            const res = await fetch(`/api/sandbox?conflict_index=${idx}&strategy_index=0`, { method: 'POST' });
            const data = await res.json();
            if (data.status === 'ok') {
                const s = data.simulation;
                resultDiv.innerHTML = `
                    <div class="sandbox-comparison">
                        <div class="sandbox-metric">
                            <div class="sandbox-metric-label">Current CRR</div>
                            <div class="sandbox-metric-value" style="color:var(--accent-amber)">${s.original_crr.toFixed(4)}</div>
                        </div>
                        <div class="sandbox-arrow">→</div>
                        <div class="sandbox-metric">
                            <div class="sandbox-metric-label">Simulated CRR</div>
                            <div class="sandbox-metric-value" style="color:var(--accent-emerald)">${s.simulated_crr.toFixed(4)}</div>
                        </div>
                    </div>
                    <div style="margin-top:12px;font-size:0.8rem;color:var(--text-secondary);text-align:center;">
                        Resolving via "<strong>${s.strategy_applied}</strong>" removes ${s.rework_removed_hours.toFixed(1)}h of rework risk.<br>
                        Remaining: ${s.remaining_debt_items} debt items (${s.remaining_rework_hours.toFixed(1)}h)
                    </div>`;
            } else {
                resultDiv.innerHTML = `<div style="color:var(--accent-rose);padding:12px;">${data.message}</div>`;
            }
        } catch (err) {
            resultDiv.innerHTML = `<div style="color:var(--accent-rose);padding:12px;">Error: ${err.message}</div>`;
        }
    }

    // ── Modal ─────────────────────────────────────────────────
    function showModal(action) {
        pendingAction = action;
        const overlay = document.getElementById('modalOverlay');
        const title = document.getElementById('modalTitle');
        const body = document.getElementById('modalBody');
        const btn = document.getElementById('modalConfirmBtn');

        if (action === 'approve') {
            title.textContent = '✅ Approve All Proposals';
            body.textContent = 'Are you sure you want to approve all validated proposals? This decision will be recorded in the immutable audit log.';
            btn.className = 'btn btn-approve';
            btn.textContent = 'Approve';
        } else {
            title.textContent = '❌ Veto All Proposals';
            body.textContent = 'Are you sure you want to veto all proposals? The Team of Rivals will need to regenerate solutions. This decision will be recorded in the immutable audit log.';
            btn.className = 'btn btn-veto';
            btn.textContent = 'Veto';
        }
        overlay.classList.add('visible');
    }

    function closeModal() {
        document.getElementById('modalOverlay').classList.remove('visible');
        pendingAction = null;
    }

    async function confirmAction() {
        const approved = pendingAction === 'approve';
        closeModal();

        try {
            await fetch(`/api/decision?approved=${approved}`, { method: 'POST' });
            showToast(approved ? '✅ Proposals Approved' : '❌ Proposals Vetoed');
        } catch (err) {
            showToast('Error submitting decision');
        }
    }

    function showToast(msg) {
        const toast = document.createElement('div');
        toast.textContent = msg;
        toast.style.cssText = `
            position:fixed;bottom:24px;right:24px;
            padding:12px 24px;border-radius:8px;
            background:var(--bg-secondary);border:1px solid var(--border-glass);
            color:var(--text-primary);font-size:0.9rem;font-weight:500;
            box-shadow:0 8px 30px rgba(0,0,0,0.3);
            z-index:300;animation:fadeSlideIn 0.3s ease-out;
        `;
        document.body.appendChild(toast);
        setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 300); }, 3000);
    }

    // ── Init ──────────────────────────────────────────────────
    connect();

    // Also fetch initial state via REST
    fetch('/api/state').then(r => r.json()).then(data => {
        if (data.status !== 'waiting') {
            currentState = data;
            renderDashboard(data);
        }
    });
    </script>
</body>
</html>
